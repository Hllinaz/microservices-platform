services:
  backend:
    build: ./backend
    container_name: ms-backend-manager
    ports:
      - '5000:5000'
    environment:
      - HOST_PROJECT_PATH=${PWD}
    volumes:
      - ./backend:/app
      - ./backend/generated-services:/generated-services
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ms-network
  frontend:
    build: ./frontend
    container_name: ms-frontend
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - ms-network
      
networks:
  ms-network:
    driver: bridge