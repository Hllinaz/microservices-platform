<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SystemCore | Microservices Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <button class="menu-trigger" onclick="toggleSidebar()">
                    <i class="fas fa-ellipsis-v"></i>
                </button>
                <div class="logo-area">
                    <i class="fas fa-layer-group"></i>
                    <span class="nav-text">System<span>Core</span></span>
                </div>
            </div>

            <nav class="main-nav">
                <a href="#" class="nav-link active"><i class="fas fa-chart-line"></i> <span class="nav-text">Dashboard</span></a>
                <a href="#" class="nav-link"><i class="fas fa-microchip"></i> <span class="nav-text">Instancias</span></a>
                <a href="#" class="nav-link"><i class="fas fa-terminal"></i> <span class="nav-text">Consola</span></a>
                <a href="#" class="nav-link"><i class="fas fa-database"></i> <span class="nav-text">Clusters</span></a>
                <div class="spacer"></div>
                <a href="#" class="nav-link"><i class="fas fa-sliders-h"></i> <span class="nav-text">Ajustes</span></a>
            </nav>
        </aside>

        <main class="viewport">
            <header class="top-nav">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Filtrar servicios activos..." id="svcSearch">
                </div>
                <div class="header-actions">
                    <div class="global-status">
                        <span class="status-indicator online"></span>
                        <span class="status-label">Cluster: Activo</span>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Sebas&background=ef4444&color=fff" class="user-avatar">
                </div>
            </header>

            <section class="content">
                <div class="content-header">
                    <h1>Microservicios</h1>
                    <button class="btn-add"><i class="fas fa-plus"></i> Desplegar</button>
                </div>

                <div class="cards-grid">
                    <div class="service-card">
                        <div class="card-top">
                            <div class="lang-tag py">PY</div>
                            <div class="service-info">
                                <h3>auth-api-manager</h3>
                                <code>ID: 992-UX</code>
                            </div>
                            <div class="health-dot pulse-green"></div>
                        </div>

                        <div class="metrics-block">
                            <div class="m-item">
                                <div class="m-label"><span>CPU Usage</span> <span>24%</span></div>
                                <div class="m-bar"><div class="m-fill" style="width: 24%"></div></div>
                            </div>
                            <div class="m-item">
                                <div class="m-label"><span>Memory</span> <span>512MB</span></div>
                                <div class="m-bar"><div class="m-fill" style="width: 60%"></div></div>
                            </div>
                        </div>

                        <div class="card-meta">
                            <span><i class="far fa-clock"></i> 14d 02h</span>
                            <span><i class="fas fa-network-wired"></i> 172.18.0.1</span>
                        </div>

                        <div class="card-btns">
                            <button class="btn-s"><i class="fas fa-redo"></i></button>
                            <button class="btn-s"><i class="fas fa-terminal"></i></button>
                            <button class="btn-s danger"><i class="fas fa-stop"></i></button>
                        </div>
                    </div>

                    <div class="service-card alert">
                        <div class="card-top">
                            <div class="lang-tag js">JS</div>
                            <div class="service-info">
                                <h3>payment-worker</h3>
                                <code>ID: 104-XK</code>
                            </div>
                            <div class="health-dot red"></div>
                        </div>

                        <div class="metrics-block">
                            <div class="m-item">
                                <div class="m-label"><span>CPU Usage</span> <span>0%</span></div>
                                <div class="m-bar"><div class="m-fill" style="width: 0%"></div></div>
                            </div>
                            <div class="m-item">
                                <div class="m-label"><span>Memory</span> <span>--</span></div>
                                <div class="m-bar"><div class="m-fill" style="width: 0%"></div></div>
                            </div>
                        </div>

                        <div class="card-meta">
                            <span class="text-danger">EXITED (Code 1)</span>
                        </div>

                        <div class="card-btns">
                            <button class="btn-s primary"><i class="fas fa-play"></i></button>
                            <button class="btn-s"><i class="fas fa-terminal"></i></button>
                            <button class="btn-s danger disabled"><i class="fas fa-stop"></i></button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }
    </script>
</body>
</html>
